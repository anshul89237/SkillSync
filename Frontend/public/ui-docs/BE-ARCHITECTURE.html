<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SkillSync Backend Architecture - Master Document</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --primary-dark: #1e40af;
            --accent: #10b981;
            --bg: #f4f7f9;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
        }

        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            z-index: 1001;
            background: #e2e8f0;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.1s ease-out;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .header-text h1 {
            margin: 0;
            font-size: 1.6rem;
            color: var(--primary-dark);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-text p {
            margin: 2px 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .time-badge {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid #bfdbfe;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        aside {
            width: 320px;
            flex-shrink: 0;
            position: sticky;
            top: 90px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            padding: 24px;
        }

        aside::-webkit-scrollbar {
            width: 6px;
        }

        aside::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .nav-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 16px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        nav li {
            margin-bottom: 6px;
        }

        nav a {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        nav a:hover {
            background: #f1f5f9;
            color: var(--primary);
            transform: translateX(4px);
        }

        nav a.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            font-weight: 600;
        }

        main {
            flex-grow: 1;
            min-width: 0;
        }

        .section-card {
            background: var(--card);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            scroll-margin-top: 100px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        h2 {
            font-size: 1.8rem;
            color: var(--text);
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
            line-height: 1.6;
        }

        .block-title {
            font-size: 1.1rem;
            color: var(--text);
            font-weight: 700;
            display: inline-block;
            margin-bottom: 12px;
            position: relative;
        }

        .block-title::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 100%;
            height: 2px;
            background: var(--primary);
            opacity: 0.2;
        }

        .theory-box {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .theory-box p {
            margin: 0 0 12px 0;
        }

        .theory-box p:last-child {
            margin: 0;
        }

        .theory-box strong {
            color: var(--primary-dark);
        }

        .impl-box {
            background: linear-gradient(to right, #eff6ff, #ffffff);
            border-left: 4px solid var(--primary);
            border-radius: 0 12px 12px 0;
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .impl-box strong {
            color: var(--primary);
        }

        .code-term {
            font-family: 'Fira Code', monospace;
            background: #e2e8f0;
            color: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .diag-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }

        .diag-box {
            background: #ffffff;
            border: 2px solid var(--primary);
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 600;
            color: var(--primary-dark);
            box-shadow: var(--shadow-sm);
        }

        .diag-box.event {
            border-color: #f59e0b;
            color: #b45309;
            background: #fffbeb;
            border-radius: 20px;
        }

        .diag-box.db {
            border-radius: 50% 50% 50% 50% / 12% 12% 12% 12%;
            border-color: #10b981;
            color: #047857;
            background: #ecfdf5;
            padding: 20px 16px;
        }

        .diag-arrow {
            color: #94a3b8;
            font-weight: bold;
            font-size: 1.2rem;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                padding: 20px;
            }

            aside {
                width: 100%;
                position: static;
                max-height: 300px;
                margin-bottom: 20px;
            }

            header {
                padding: 15px 20px;
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }

            .section-card {
                padding: 24px;
                scroll-margin-top: 140px;
            }
        }
    </style>
</head>

<body>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    <header>
        <div class="header-text">
            <h1>SkillSync Backend Architecture</h1>
            <p>Presentation Ready Deep-Dive Masterclass</p>
        </div>
        <div class="time-badge">Est. Presentation: 60 mins</div>
    </header>
    <div class="container">
        <aside>
            <div class="nav-title">Presentation Agenda</div>
            <nav>
                <ul id="navlist"></ul>
            </nav>
        </aside>
        <main id="content"></main>
    </div>
    <script>
        const db = [
            { id: "overview", title: "1. System Overview", desc: "Bird's eye view of the ecosystem.", theory: "<p><strong>Why Microservices?</strong> Monoliths bundle all domains. Microservices decouple these domains.</p>", impl: "<div class='diag-container'><div class='diag-box'>Client UI</div><div class='diag-arrow'>→</div><div class='diag-box'>Gateway</div><div class='diag-arrow'>→</div><div class='diag-box'>Microservices</div></div>" },
            { id: "microservices", title: "2. Microservices Architecture", desc: "Explicit responsibility of every service.", theory: "<p><strong>Domain-Driven Design:</strong> Each microservice completely owns its data and domain.</p>", impl: "<p>We run Gateway, Eureka, Auth, User, Session, Payment, Notif. Each has a distinct database schema.</p>" },
            { id: "gateway", title: "3. API Gateway Flow", desc: "The single entry point coordinating all inbound frontend requests.", theory: "<p><strong>What is an API Gateway?</strong> The Gateway is a reverse proxy taking requests on port 8080 and internally routing them.</p>", impl: "<div class='diag-container'><div class='diag-box'>FE</div><div class='diag-arrow'>→</div><div class='diag-box'>Gateway (:8080)</div><div class='diag-arrow'>→</div><div class='diag-box'>Session-Service</div></div>" },
            { id: "auth", title: "4. Authentication Service", desc: "Verify identities of incoming requests.", theory: "<p><strong>Stateless Auth:</strong> We issue signed JSON Web Tokens (JWT) containing identity.</p>", impl: "<p><strong>Global Token Verification:</strong> Gateway catches the request, verifies JWT signature, and forwards authentic requests.</p>" },
            { id: "rbac", title: "5. Authorization & Roles", desc: "Restricting actions strictly to those who have permission.", theory: "<p><strong>RBAC:</strong> Authenticated means you are registered. Authorized means you are allowed.</p>", impl: "<p><strong>Method-Level Security:</strong> We utilize <code>@PreAuthorize</code> annotations. If an unauthorized user hits an endpoint, Spring Security intercepts it.</p>" },
            { id: "user", title: "6. User Service", desc: "Managing profile metadata and roles.", theory: "<p><strong>Identity vs Profile:</strong> Auth Service manages passwords, User service handles heavy profile data.</p>", impl: "<p>Maintains the central catalog of all users. Handles upgrading LEARNER to MENTOR, and broadcasts UserUpdatedEvents.</p>" },
            { id: "session", title: "7. Session Service", desc: "The core domain representing P2P mentor-learner interaction schedules.", theory: "<p><strong>Timezone Standardization:</strong> All data is saved in UTC.</p>", impl: "<p><strong>Scheduling Logic:</strong> Validates time overlaps. Times are strictly ZonedDateTime (UTC) in Postgres.</p>" },
            { id: "booking", title: "8. Booking Flow", desc: "Synchronous bridge between establishing a session and locking it.", theory: "<p><strong>Distributed Transactions:</strong> Transactions are spread across multiple databases.</p>", impl: "<div class='diag-container'><div class='diag-box'>Click Book</div><div class='diag-arrow'>→</div><div class='diag-box'>State: PENDING</div><div class='diag-arrow'>→</div><div class='diag-box'>Await Payment</div></div>" },
            { id: "payment", title: "9. Payment Service", desc: "Handling Stripe gateway integrations securely.", theory: "<p><strong>Idempotency:</strong> Backend must mathematically ensure a user is never charged twice.</p>", impl: "<p><strong>Stripe Integration:</strong> Explict Idempotency Keys on all Stripe API calls so duplicated payloads are safely ignored.</p>" },
            { id: "saga", title: "10. Payment Saga", desc: "Orchestrating complex multi-service guarantees.", theory: "<p><strong>Saga Pattern:</strong> A Saga implements sequence-based transactions with compensating fallbacks.</p>", impl: "<div class='diag-container'><div class='diag-box'>Session Init</div><div class='diag-arrow'>⇄</div><div class='diag-box'>Payment Sub</div><div class='diag-arrow'>↘</div><div class='diag-box'>Refund (Fallback)</div></div>" },
            { id: "cqrs", title: "11. CQRS Implementation", desc: "Separating reads from writes.", theory: "<p><strong>CQRS:</strong> Reading a session happens 100x more often than creating one. CQRS splits the code.</p>", impl: "<p>Repositories distinguish Command operations and Query operations using specific DTO projections.</p>" },
            { id: "command", title: "12. Command Flow", desc: "Mutating state with strict validation.", theory: "<p><strong>The Write Path:</strong> Writes must be perfectly validated.</p>", impl: "<p><strong>Spring Validation:</strong> Commands enter via REST Post with @Valid and custom annotations.</p>" },
            { id: "query", title: "13. Query Flow", desc: "Highly-performant data extraction.", theory: "<p><strong>The N+1 Problem:</strong> Naive ORM reads fetch a list of 10 sessions, then query 10 more times causing lag.</p>", impl: "<p><strong>Optimized Reads:</strong> We leverage Spring Data JPA with @EntityGraph to formulate singular LEFT JOIN queries.</p>" },
            { id: "events", title: "14. Event Driven Comm", desc: "Decoupling services through Pub/Sub.", theory: "<p><strong>Synchronous vs Asynchronous:</strong> If Notif service is down, User registration shouldn't fail.</p>", impl: "<div class='diag-container'><div class='diag-box'>Create User</div><div class='diag-arrow'>→</div><div class='diag-box event'>Event: UserCreated</div><div class='diag-arrow'>→</div><div class='diag-box'>Notif Service</div></div>" },
            { id: "kafka", title: "15. Messaging / RabbitMQ", desc: "The backbone of inter-service asynchronous data flow.", theory: "<p><strong>Message Brokers:</strong> Topics fan-out messages. Queues ensure round-robin distribution.</p>", impl: "<p><strong>RabbitMQ Ecosystem:</strong> We established Topic Exchanges. Services inject RabbitTemplate to publish and @RabbitListener to consume.</p>" },
            { id: "notif", title: "16. Notification Service", desc: "Centralizing all outbound alerts.", theory: "<p><strong>Single Responsibility:</strong> Only Notification service uses SMTP server or WebSocket hub.</p>", impl: "<p>Listens to every event in the system. Formats HTML templates using Thymeleaf and pushes alerts.</p>" },
            { id: "flow", title: "17. Email + InApp Flow", desc: "Dual-channel alerts for maximum visibility.", theory: "<p><strong>Channel Diversification:</strong> Critical alerts go to Email. Transitory alerts go to In-App bells.</p>", impl: "<p>Uses JavaMailSender for external emails, and saves an internal SystemNotification entity to PostgreSQL for the bell icon.</p>" },
            { id: "db", title: "18. Database Design", desc: "Polyglot persistence and strict referential integrity.", theory: "<p><strong>Database per Service:</strong> Sharing a single db across microservices is an anti-pattern.</p>", impl: "<div class='diag-container'><div class='diag-box'>Auth Service</div><div class='diag-arrow'>↔</div><div class='diag-box db'>auth_db</div><div class='diag-box'>Session Service</div><div class='diag-arrow'>↔</div><div class='diag-box db'>session_db</div></div>" },
            { id: "service-comm", title: "19. Service Communication", desc: "Direct Synchronous interactions.", theory: "<p><strong>Sometimes you just need an answer NOW:</strong> Event buses are great, but synchronous checks are needed sometimes.</p>", impl: "<p><strong>OpenFeign Clients:</strong> We utilize declarative Spring Cloud OpenFeign. Eureka dynamically resolves IPs.</p>" },
            { id: "security", title: "20. Security Architecture", desc: "Protecting the infrastructure.", theory: "<p><strong>Defense in Depth:</strong> Layers of protection assuming the layer before it will eventually fall.</p>", impl: "<p>1. Edge strips CORS. 2. JWTs validate identity. 3. BCrypt hashes passwords. 4. Eureka hides internal endpoints.</p>" },
            { id: "retry", title: "21. Retry & Idempotency", desc: "Handling network blips.", theory: "<p><strong>Transient Failures:</strong> You shouldn't fail a booking for a momentary blip.</p>", impl: "<p><strong>Resilience4j:</strong> Retry interceptors sleep for 500ms and try again up to 3 times for failed HTTP calls.</p>" },
            { id: "caching", title: "22. Caching Strategy", desc: "Saving database IOPS.", theory: "<p><strong>The Speed of RAM:</strong> Memory is 100x faster than disk.</p>", impl: "<p><strong>Spring Cache:</strong> Attach @Cacheable to endpoints. Bypasses the DB completely.</p>" },
            { id: "observability", title: "23. Observability & Logging", desc: "Knowing exactly what is breaking.", theory: "<p><strong>Distributed Tracing:</strong> How do you track an error across 4 machines?</p>", impl: "<p><strong>Zipkin + Sleuth:</strong> Requests get a globally unique TraceID injected into headers and Queues.</p>" },
            { id: "e2e", title: "24. End to End Transaction", desc: "Life cycle of a user action.", theory: "<p><strong>The Final Symphony:</strong> Bringing every concept together.</p>", impl: "<p>1. Edge Gateway. 2. Proxy Session. 3. Sync Comm Mentor check. 4. Payment Saga. 5. DB Save. 6. Async Event. 7. Email Notif.</p>" }
        ];

        function renderPage() {
            const navlist = document.getElementById("navlist");
            const content = document.getElementById("content");
            db.forEach((block) => {
                const li = document.createElement("li");
                const a = document.createElement("a");
                a.href = "#" + block.id; a.id = "link-" + block.id; a.innerHTML = block.title.split('. ')[1] || block.title;
                li.appendChild(a); navlist.appendChild(li);
                const article = document.createElement("article");
                article.className = "section-card"; article.id = block.id;
                article.innerHTML = '<h2>' + block.title + '</h2><div class="section-desc">' + block.desc + '</div><div class="block-title">Deep-Dive Theory</div><div class="theory-box">' + block.theory + '</div><div class="block-title">SkillSync Implementation</div><div class="impl-box">' + block.impl + '</div>';
                content.appendChild(article);
            });
            if (db.length) document.getElementById("link-" + db[0].id).classList.add("active");
        }

        function initScrollSpy() {
            const sections = document.querySelectorAll(".section-card");
            const navLinks = document.querySelectorAll("nav a");
            const progressBar = document.getElementById("progress-bar");
            window.addEventListener("scroll", () => {
                let current = "";
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                progressBar.style.width = ((winScroll / height) * 100) + "%";
                sections.forEach((sec) => { if (pageYOffset >= sec.offsetTop - 200) current = sec.getAttribute("id"); });
                navLinks.forEach((link) => {
                    link.classList.remove("active");
                    if (link.getAttribute("href") === "#" + current) link.classList.add("active");
                });
            });
        }
        document.addEventListener("DOMContentLoaded", () => { renderPage(); initScrollSpy(); });
    </script>
</body>

</html>
