<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SkillSync Deployment & DevOps Architecture</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --primary-dark: #1e40af;
            --accent: #10b981;
            --bg: #f4f7f9;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
        }

        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            z-index: 1001;
            background: #e2e8f0;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.1s ease-out;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .header-text h1 {
            margin: 0;
            font-size: 1.6rem;
            color: var(--primary-dark);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-text p {
            margin: 2px 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .time-badge {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid #bfdbfe;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        aside {
            width: 320px;
            flex-shrink: 0;
            position: sticky;
            top: 90px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            padding: 24px;
        }

        aside::-webkit-scrollbar {
            width: 6px;
        }

        aside::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .nav-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 16px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        nav li {
            margin-bottom: 6px;
        }

        nav a {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        nav a:hover {
            background: #f1f5f9;
            color: var(--primary);
            transform: translateX(4px);
        }

        nav a.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            font-weight: 600;
        }

        main {
            flex-grow: 1;
            min-width: 0;
        }

        .section-card {
            background: var(--card);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            scroll-margin-top: 100px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        h2 {
            font-size: 1.8rem;
            color: var(--text);
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
            line-height: 1.6;
        }

        .block-title {
            font-size: 1.1rem;
            color: var(--text);
            font-weight: 700;
            display: inline-block;
            margin-bottom: 12px;
            position: relative;
        }

        .block-title::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 100%;
            height: 2px;
            background: var(--primary);
            opacity: 0.2;
        }

        .theory-box {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .theory-box p {
            margin: 0 0 12px 0;
        }

        .theory-box p:last-child {
            margin: 0;
        }

        .theory-box strong {
            color: var(--primary-dark);
        }

        .impl-box {
            background: linear-gradient(to right, #eff6ff, #ffffff);
            border-left: 4px solid var(--primary);
            border-radius: 0 12px 12px 0;
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .impl-box strong {
            color: var(--primary);
        }

        .code-term {
            font-family: 'Fira Code', monospace;
            background: #e2e8f0;
            color: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .diag-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }

        .diag-box {
            background: #ffffff;
            border: 2px solid var(--primary);
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 600;
            color: var(--primary-dark);
            box-shadow: var(--shadow-sm);
        }

        .diag-box.event {
            border-color: #f59e0b;
            color: #b45309;
            background: #fffbeb;
            border-radius: 20px;
        }

        .diag-box.db {
            border-radius: 50% 50% 50% 50% / 12% 12% 12% 12%;
            border-color: #10b981;
            color: #047857;
            background: #ecfdf5;
            padding: 20px 16px;
        }

        .diag-arrow {
            color: #94a3b8;
            font-weight: bold;
            font-size: 1.2rem;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                padding: 20px;
            }

            aside {
                width: 100%;
                position: static;
                max-height: 300px;
                margin-bottom: 20px;
            }

            header {
                padding: 15px 20px;
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }

            .section-card {
                padding: 24px;
                scroll-margin-top: 140px;
            }
        }
    </style>
</head>

<body>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    <header>
        <div class="header-text">
            <h1>SkillSync Deployment & DevOps</h1>
            <p>Presentation Ready Deep-Dive Masterclass</p>
        </div>
        <div class="time-badge">Est. Presentation: 60 mins</div>
    </header>
    <div class="container">
        <aside>
            <div class="nav-title">Presentation Agenda</div>
            <nav>
                <ul id="navlist"></ul>
            </nav>
        </aside>
        <main id="content"></main>
    </div>
    <script>
        const db = [
            { id: "overview", title: "1. Deployment Overview", desc: "How we move code from local machines to global users.", theory: "<p><strong>Why DevOps?</strong> Writing code is 50%. Deploying it reliably is the other 50%.</p>", impl: "<div class='diag-container'><div class='diag-box'>Git Push</div><div class='diag-arrow'>→</div><div class='diag-box'>GitHub Actions</div><div class='diag-arrow'>→</div><div class='diag-box'>Docker Deploy</div></div>" },
            { id: "infra", title: "2. Infrastructure Architecture", desc: "The physical server topology.", theory: "<p><strong>Cloud Computing:</strong> We need a machine that never sleeps and has a static IP address.</p>", impl: "<p><strong>AWS Ecosystem:</strong> We leverage a virtual private server hosting our entire Dockerized microservices stack.</p>" },
            { id: "ec2", title: "3. AWS EC2 Setup", desc: "Provisioning our compute power.", theory: "<p><strong>Virtual Machines:</strong> EC2 provides raw compute without underlying OS restrictions.</p>", impl: "<p><strong>Instance Config:</strong> We spun up an Ubuntu instance. Configured Security Groups to only allow Port 80 (HTTP) and 443 (HTTPS) ingress.</p>" },
            { id: "docker", title: "4. Docker Architecture", desc: "Packaging apps uniformly.", theory: "<p><strong>Containers vs VMs:</strong> Containers share the host OS kernel but isolate dependencies perfectly.</p>", impl: "<div class='diag-container'><div class='diag-box'>App.jar</div><div class='diag-arrow'>+</div><div class='diag-box'>Java 21 Run</div><div class='diag-arrow'>=</div><div class='diag-box'>Immutable Image</div></div>" },
            { id: "compose", title: "5. Docker Compose Services", desc: "Orchestrating multi-container environments.", theory: "<p><strong>Service Networking:</strong> 15 containers need to speak to each other by name, not IP.</p>", impl: "<p><strong>compose.yaml:</strong> Defines all 9 services, 4 databases, metrics, and message brokers inside a single custom bridge network.</p>" },
            { id: "cicd", title: "6. CI/CD Pipeline", desc: "Continuous Integration & Deployment.", theory: "<p><strong>Automation:</strong> Humans make mistakes when deploying. Automation does not.</p>", impl: "<p><strong>Pipeline Goals:</strong> Every push triggers a build verify, test run, container build, and remote SSH push.</p>" },
            { id: "actions", title: "7. GitHub Actions Workflow", desc: "The engine driving our automation.", theory: "<p><strong>Event Driven CI:</strong> GitHub listens for push events and spins up ephemeral Ubuntu runners to execute scripts.</p>", impl: "<p>Runs tests via Maven, builds the Frontend with Vite, and reports status to SonarCloud.</p>" },
            { id: "build", title: "8. Build Pipeline", desc: "Compiling the code.", theory: "<p><strong>Immutable Artifacts:</strong> Never compile on the production server. Build it once, deploy it everywhere.</p>", impl: "<p><strong>Maven & NPM:</strong> Action runners execute <code>mvn clean package</code> and <code>npm run build</code>, saving the resulting artifacts.</p>" },
            { id: "image", title: "9. Image Build Flow", desc: "Baking artifacts into Docker Images.", theory: "<p><strong>Layer Caching:</strong> Docker builds are layered. Unchanged dependencies are cached to save time.</p>", impl: "<p>Built images are tagged with the Git Commit SHA and pushed to Docker Hub.</p>" },
            { id: "startup", title: "10. Container Startup Flow", desc: "Booting services in the correct order.", theory: "<p><strong>Dependency Chains:</strong> API Gateway cannot start if Eureka is dead.</p>", impl: "<p><strong>depends_on:</strong> Compose file dictates that Eureka starts first, then Config Server, then downstream services.</p>" },
            { id: "env", title: "11. Environment Variables", desc: "Configuring apps without changing code.", theory: "<p><strong>12 Factor Apps:</strong> Configuration must be decoupled from the core application logic.</p>", impl: "<p>We utilize a central <code>.env</code> file on the EC2 instance mapped into the Compose variables natively.</p>" },
            { id: "secrets", title: "12. Secrets Management", desc: "Hiding passwords from the public.", theory: "<p><strong>Never Commit Secrets:</strong> Git history is forever. Passwords in codebase lead to breaches.</p>", impl: "<p>All DB passwords and Stripe keys are held in GitHub Secrets and injected only at runtime.</p>" },
            { id: "proxy", title: "13. Reverse Proxy / Nginx", desc: "Routing traffic from Port 80 to proper containers.", theory: "<p><strong>Why Reverse Proxy?</strong> Direct exposing Tomcat servers is insecure and hard to scale.</p>", impl: "<div class='diag-container'><div class='diag-box'>Internet</div><div class='diag-arrow'>→</div><div class='diag-box'>Nginx (:80)</div><div class='diag-arrow'>→</div><div class='diag-box'>FE / Gateway</div></div>" },
            { id: "ssl", title: "14. SSL Setup", desc: "Encrypting traffic with Let's Encrypt.", theory: "<p><strong>HTTPS encryption:</strong> Protects data payloads from Man In The Middle attacks.</p>", impl: "<p>We deployed Certbot on Nginx to automatically issue and renew TLS certificates. Traffic is locked over HTTPS.</p>" },
            { id: "health", title: "15. Health Checks", desc: "Monitoring node life signs.", theory: "<p><strong>Why ping?</strong> A container might technically be running, but its Java runtime is frozen.</p>", impl: "<p><strong>Docker Healthchecks:</strong> We ping Spring Actuator <code>/health</code> endpoints. Containers aren't marked ready until returning 200 OK.</p>" },
            { id: "networking", title: "16. Container Networking", desc: "Internal DNS isolation.", theory: "<p><strong>Bridge Networks:</strong> Prevents random containers from talking to each other if not authorized.</p>", impl: "<p>We utilize a unified <code>skillsync_network</code>. Eureka magically resolves hostnames to IPs internally.</p>" },
            { id: "rolling", title: "17. Rolling Deployment", desc: "Deploying updates without breaking.", theory: "<p><strong>Rolling Updates:</strong> Bring down 1 container, spin up a new one, move to the next.</p>", impl: "<p>Docker Compose seamlessly restarts updated images while retaining volume state.</p>" },
            { id: "zero", title: "18. Zero Downtime Strategy", desc: "Ensuring 99.9% uptime.", theory: "<p><strong>Blue/Green Deploy:</strong> Run old and new code simultaneously, shift router traffic.</p>", impl: "<p>API Gateway enables seamless routing if replica counts increase.</p>" },
            { id: "logs", title: "19. Monitoring & Logs", desc: "Knowing what fails in production.", theory: "<p><strong>Centralized Logging:</strong> SSHing into 9 containers to read logs is impossible.</p>", impl: "<p>We use Prometheus to scrape metrics and Grafana to visualize load and CPU spikes.</p>" },
            { id: "fail", title: "20. Failure Recovery", desc: "Bouncing back from crashes.", theory: "<p><strong>Restart Policies:</strong> If a machine runs out of RAM, the app shouldn't stay dead forever.</p>", impl: "<p>Docker restart policy <code>unless-stopped</code> ensures apps natively reboot if underlying compute crashes.</p>" },
            { id: "backup", title: "21. Backup Strategy", desc: "Protecting data persistence.", theory: "<p><strong>Ephemeral vs Persistent:</strong> Destroying a container destroys all data unless Volumes are attached.</p>", impl: "<p>PostgreSQL nodes use explicit named volumes mounted directly into EC2 storage drives.</p>" },
            { id: "hardening", title: "22. Security Hardening", desc: "Locking down ports.", theory: "<p><strong>Attack Surface:</strong> Open ports are targets for botnets.</p>", impl: "<p>Postgres, RabbitMQ, and Eureka ports are locked locally. Only Nginx is exposed.</p>" },
            { id: "prod", title: "23. Production Readiness", desc: "Memory limits and JVM tuning.", theory: "<p><strong>OOM Kills:</strong> Java will eat all memory if you let it.</p>", impl: "<p>We strictly limited services to <code>512M</code> memory limits natively in Compose to prevent Host starvation.</p>" },
            { id: "e2e-deploy", title: "24. End to End Deployment Flow", desc: "The automated journey from commit to production.", theory: "<p><strong>Pipeline execution sequence:</strong> Predictable deployment breeds release confidence.</p>", impl: "<p>1. User pushes. 2. Github Actions builds Maven. 3. Docker build runs. 4. SSH into EC2. 5. Pull new images. 6. Start containers. 7. Run Health checks.</p>" }
        ];

        function renderPage() {
            const navlist = document.getElementById("navlist");
            const content = document.getElementById("content");
            db.forEach((block) => {
                const li = document.createElement("li");
                const a = document.createElement("a");
                a.href = "#" + block.id; a.id = "link-" + block.id; a.innerHTML = block.title.split('. ')[1] || block.title;
                li.appendChild(a); navlist.appendChild(li);
                const article = document.createElement("article");
                article.className = "section-card"; article.id = block.id;
                article.innerHTML = '<h2>' + block.title + '</h2><div class="section-desc">' + block.desc + '</div><div class="block-title">Explanation</div><div class="theory-box">' + block.theory + '</div><div class="block-title">Deployment Steps & Notes</div><div class="impl-box">' + block.impl + '</div>';
                content.appendChild(article);
            });
            if (db.length) document.getElementById("link-" + db[0].id).classList.add("active");
        }

        function initScrollSpy() {
            const sections = document.querySelectorAll(".section-card");
            const navLinks = document.querySelectorAll("nav a");
            const progressBar = document.getElementById("progress-bar");
            window.addEventListener("scroll", () => {
                let current = "";
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                progressBar.style.width = ((winScroll / height) * 100) + "%";
                sections.forEach((sec) => { if (pageYOffset >= sec.offsetTop - 200) current = sec.getAttribute("id"); });
                navLinks.forEach((link) => {
                    link.classList.remove("active");
                    if (link.getAttribute("href") === "#" + current) link.classList.add("active");
                });
            });
        }
        document.addEventListener("DOMContentLoaded", () => { renderPage(); initScrollSpy(); });
    </script>
</body>

</html>
