spring.application.name=skill-service
server.port=${SERVER_PORT:8084}

# ============================================================
# Config Server (Spring Boot 3 modern approach - replaces bootstrap.properties)
# ============================================================
spring.config.import=configserver:http://${CONFIG_SERVER_HOST:skillsync-config}:8888
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-interval=6000
spring.cloud.config.retry.multiplier=1.5

# ============================================================
# Database
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skillsync_skill}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.properties.hibernate.default_schema=skills
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Connection pool resilience
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.initialization-fail-timeout=-1

# ============================================================
# Eureka Client
# ============================================================
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:skillsync-eureka}:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.registry-fetch-interval-seconds=5

# ============================================================
# Actuator & Observability
# ============================================================
logging.file.name=logs/skill-service.log
management.endpoints.web.exposure.include=health,info,metrics,caches,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=skill-service
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# Structured logging with traceId/spanId
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]

# ============================================================
# Swagger / OpenAPI (springdoc)
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
springdoc.show-actuator=false

# ============================================================
# RabbitMQ (for event-driven cache sync)
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ============================================================
# Redis Cache
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=1000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# Cache TTL (seconds)
cache.ttl.skill=3600
cache.ttl.default=1800
