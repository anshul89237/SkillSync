server.port=${SERVER_PORT:8888}

spring.application.name=config-server

# Git-backed config repository (PUBLIC repo - no credentials needed)
spring.cloud.config.server.git.uri=https://github.com/anshul89237/CloudConfig
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.timeout=10

# Eureka registration
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:skillsync-eureka}:8761/eureka
eureka.instance.prefer-ip-address=true

# Startup resilience - don't crash if Eureka is slow
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.registry-fetch-interval-seconds=5

# Actuator & Logging
logging.file.name=logs/config-server.log
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
