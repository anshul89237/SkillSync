spring.application.name=api-gateway
server.port=${SERVER_PORT:8080}

# ============================================================
# Config Server (Spring Boot 3 modern approach - replaces bootstrap.properties)
# ============================================================
spring.config.import=configserver:http://${CONFIG_SERVER_HOST:skillsync-config}:8888
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-interval=6000
spring.cloud.config.retry.multiplier=1.5

# ============================================================
# Eureka Client
# ============================================================
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:skillsync-eureka}:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.registry-fetch-interval-seconds=5

# ============================================================
# CORS - Allowed Origins (configurable via env variable)
# ============================================================
app.cors.allowed-origins=${ALLOWED_ORIGINS}


# ============================================================
# Gateway Routes
# ============================================================
spring.cloud.gateway.routes[0].id=block-internal-routes
spring.cloud.gateway.routes[0].uri=no://op
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/internal/**
spring.cloud.gateway.routes[0].filters[0]=SetStatus=403
spring.cloud.gateway.routes[0].order=-1

spring.cloud.gateway.routes[1].id=auth-service-api
spring.cloud.gateway.routes[1].uri=lb://auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=auth-actuator-alias
spring.cloud.gateway.routes[1].uri=lb://auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/auth/actuator/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/auth/(?<segment>.*),/${segment}

spring.cloud.gateway.routes[2].id=auth-alias
spring.cloud.gateway.routes[2].uri=lb://auth-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/auth/(?<segment>.*),/api/auth/${segment}

spring.cloud.gateway.routes[3].id=oauth2-alias
spring.cloud.gateway.routes[3].uri=lb://auth-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/oauth2/**

spring.cloud.gateway.routes[4].id=login-alias
spring.cloud.gateway.routes[4].uri=lb://auth-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/login/**

spring.cloud.gateway.routes[5].id=user-service
spring.cloud.gateway.routes[5].uri=lb://user-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[5].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[6].id=user-alias
spring.cloud.gateway.routes[6].uri=lb://user-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/user/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/user/(?<segment>.*),/api/users/${segment}
spring.cloud.gateway.routes[6].filters[1]=JwtAuthenticationFilter

spring.cloud.gateway.routes[7].id=mentor-route
spring.cloud.gateway.routes[7].uri=lb://user-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/mentors/**
spring.cloud.gateway.routes[7].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[8].id=skill-service
spring.cloud.gateway.routes[8].uri=lb://skill-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/skills/**

spring.cloud.gateway.routes[9].id=session-service
spring.cloud.gateway.routes[9].uri=lb://session-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/sessions/**
spring.cloud.gateway.routes[9].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[10].id=session-alias
spring.cloud.gateway.routes[10].uri=lb://session-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/session/**
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/session/(?<segment>.*),/api/sessions/${segment}
spring.cloud.gateway.routes[10].filters[1]=JwtAuthenticationFilter

spring.cloud.gateway.routes[11].id=group-route
spring.cloud.gateway.routes[11].uri=lb://user-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/groups/**
spring.cloud.gateway.routes[11].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[12].id=review-route
spring.cloud.gateway.routes[12].uri=lb://session-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/reviews/**
spring.cloud.gateway.routes[12].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[13].id=notification-service
spring.cloud.gateway.routes[13].uri=lb://notification-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[13].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[14].id=payment-route
spring.cloud.gateway.routes[14].uri=lb://payment-service
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.routes[14].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[15].id=admin-route
spring.cloud.gateway.routes[15].uri=lb://user-service
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.routes[15].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[16].id=notification-ws
spring.cloud.gateway.routes[16].uri=lb:ws://notification-service
spring.cloud.gateway.routes[16].predicates[0]=Path=/ws/**

# --- Swagger / API-Docs Routes (proxy each service's /v3/api-docs) ---
spring.cloud.gateway.routes[17].id=auth-service-api-docs
spring.cloud.gateway.routes[17].uri=lb://auth-service
spring.cloud.gateway.routes[17].predicates[0]=Path=/service-docs/auth-service/v3/api-docs
spring.cloud.gateway.routes[17].filters[0]=RewritePath=/service-docs/auth-service/(?<segment>.*),/${segment}

spring.cloud.gateway.routes[18].id=user-service-api-docs
spring.cloud.gateway.routes[18].uri=lb://user-service
spring.cloud.gateway.routes[18].predicates[0]=Path=/service-docs/user-service/v3/api-docs
spring.cloud.gateway.routes[18].filters[0]=RewritePath=/service-docs/user-service/(?<segment>.*),/${segment}

spring.cloud.gateway.routes[19].id=skill-service-api-docs
spring.cloud.gateway.routes[19].uri=lb://skill-service
spring.cloud.gateway.routes[19].predicates[0]=Path=/service-docs/skill-service/v3/api-docs
spring.cloud.gateway.routes[19].filters[0]=RewritePath=/service-docs/skill-service/(?<segment>.*),/${segment}

spring.cloud.gateway.routes[20].id=session-service-api-docs
spring.cloud.gateway.routes[20].uri=lb://session-service
spring.cloud.gateway.routes[20].predicates[0]=Path=/service-docs/session-service/v3/api-docs
spring.cloud.gateway.routes[20].filters[0]=RewritePath=/service-docs/session-service/(?<segment>.*),/${segment}

spring.cloud.gateway.routes[21].id=notification-service-api-docs
spring.cloud.gateway.routes[21].uri=lb://notification-service
spring.cloud.gateway.routes[21].predicates[0]=Path=/service-docs/notification-service/v3/api-docs
spring.cloud.gateway.routes[21].filters[0]=RewritePath=/service-docs/notification-service/(?<segment>.*),/${segment}

spring.cloud.gateway.routes[22].id=payment-service-api-docs
spring.cloud.gateway.routes[22].uri=lb://payment-service
spring.cloud.gateway.routes[22].predicates[0]=Path=/service-docs/payment-service/v3/api-docs
spring.cloud.gateway.routes[22].filters[0]=RewritePath=/service-docs/payment-service/(?<segment>.*),/${segment}

# ============================================================
# Logging & Observability
# ============================================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.file.name=logs/api-gateway.log
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=api-gateway
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# Structured logging with traceId/spanId
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]

# ============================================================
# JWT Secret (for Gateway JWT filter)
# ============================================================
jwt.secret=${JWT_SECRET}

# ============================================================
# Swagger UI — Aggregated on Gateway (single entry point)
# ============================================================
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.oauth2-redirect-url=${SWAGGER_OAUTH2_REDIRECT_URL:/swagger-ui/oauth2-redirect.html}
springdoc.swagger-ui.urls[0].url=/service-docs/auth-service/v3/api-docs
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[1].url=/service-docs/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=User Service (Users + Mentors + Groups)
springdoc.swagger-ui.urls[2].url=/service-docs/skill-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Skill Service
springdoc.swagger-ui.urls[3].url=/service-docs/session-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Session Service (Sessions + Reviews)
springdoc.swagger-ui.urls[4].url=/service-docs/notification-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Notification Service
springdoc.swagger-ui.urls[5].url=/service-docs/payment-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=Payment Service
springdoc.api-docs.enabled=true
server.forward-headers-strategy=framework

