# Grafana Datasource Provisioning
apiVersion: 1

datasources:

  # Prometheus — Metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Loki — Logs
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false

  # Zipkin — Traces
  - name: Zipkin
    type: zipkin
    access: proxy
    url: http://zipkin:9411
    editable: false
