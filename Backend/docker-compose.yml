# ============================================================
#  SkillSync - Docker Compose (Production-Ready)
#  Usage: docker-compose up --build
#  Config: All values from .env (never hardcode secrets here)
# ============================================================
#
#  Startup Order:
#    postgres/rabbitmq → eureka → config-server → microservices → gateway
#
#  Exposed Ports:
#    80    - API Gateway (public entry point)
#    8080  - API Gateway (debug/local checks)
#    8761  - Eureka Dashboard (debug only)
#    15672 - RabbitMQ Management UI (debug only)
#    9411  - Zipkin Tracing UI
#    9090  - Prometheus Metrics UI
#    3000  - Grafana Dashboards (admin/skillsync)
#    3100  - Loki Log Aggregation API
#
#  NOTE: Individual service ports are NOT exposed.
#        All ingress traffic goes directly through the API Gateway.
# ============================================================

services:

  # ======================== INFRASTRUCTURE ====================

  postgres:
    image: postgres:16-alpine
    container_name: skillsync-postgres
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/1-init-databases.sql
      - ./insert-data.sql:/docker-entrypoint-initdb.d/2-insert-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      skillsync-net:
        aliases:
          - postgres
          - skillsync-postgres
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: skillsync-rabbitmq
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"     # AMQP
      - "127.0.0.1:15672:15672"   # Management UI (http://localhost:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      skillsync-net:
        aliases:
          - rabbitmq
          - skillsync-rabbitmq
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: skillsync-redis
    deploy:
      resources:
        limits:
          memory: 256M
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      skillsync-net:
        aliases:
          - redis
          - skillsync-redis
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: skillsync-zipkin
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "127.0.0.1:9411:9411"   # Zipkin UI (http://localhost:9411)
    environment:
      STORAGE_TYPE: mem
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9411/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      skillsync-net:
        aliases:
          - zipkin
          - skillsync-zipkin
    restart: unless-stopped

  # ======================== PROMETHEUS ========================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: skillsync-prometheus
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "127.0.0.1:9090:9090"   # Prometheus UI (http://localhost:9090)
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.external-url=/prometheus/'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/prometheus/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      skillsync-net:
        aliases:
          - prometheus
          - skillsync-prometheus
    restart: unless-stopped

  # ======================== GRAFANA ===========================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: skillsync-grafana
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "127.0.0.1:3000:3000"   # Grafana UI (http://localhost:3000)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://api.skillsync.mraks.dev/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      skillsync-net:
        aliases:
          - grafana
          - skillsync-grafana
    restart: unless-stopped

  # ======================== LOKI (Log Aggregation) ============
  loki:
    image: grafana/loki:2.9.4
    container_name: skillsync-loki
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "127.0.0.1:3100:3100"   # Loki API
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      skillsync-net:
        aliases:
          - loki
          - skillsync-loki
    restart: unless-stopped

  # ======================== DISCOVERY & CONFIG ================

  eureka-server:
    image: ${DOCKERHUB_USERNAME}/skillsync:eureka
    container_name: skillsync-eureka
    deploy:
      resources:
        limits:
          memory: 512M
    env_file: .env
    environment:
      JAVA_OPTS: "-Xms128m -Xmx384m"
    ports:
      - "127.0.0.1:8761:8761"   # Exposed for debug dashboard — remove in true production
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      skillsync-net:
        aliases:
          - eureka-server
          - skillsync-eureka
    restart: unless-stopped

  config-server:
    image: ${DOCKERHUB_USERNAME}/skillsync:config
    container_name: skillsync-config
    deploy:
      resources:
        limits:
          memory: 512M
    env_file: .env
    environment:
      CONFIG_SERVER_PROFILE: git
      JAVA_OPTS: "-Xms128m -Xmx384m"
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 80s
    networks:
      skillsync-net:
        aliases:
          - config-server
          - skillsync-config
    restart: unless-stopped

  # ======================== API GATEWAY =======================

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/skillsync:gateway
    container_name: skillsync-gateway
    deploy:
      resources:
        limits:
          memory: 512M
    env_file: .env
    environment:
      JAVA_OPTS: "-Xms128m -Xmx384m"
    ports:
      - "127.0.0.1:8080:8080"   # Bound to localhost to force traffic through NGINX host proxy
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health/readiness || curl -fsS http://localhost:8080/actuator/health/readiness || nc -z localhost 8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 140s
    networks:
      skillsync-net:
        aliases:
          - api-gateway
          - skillsync-gateway
    restart: unless-stopped

  # ======================== MICROSERVICES =====================

  auth-service:
    image: ${DOCKERHUB_USERNAME}/skillsync:auth
    container_name: skillsync-auth
    deploy:
      resources:
        limits:
          memory: 640M
    env_file: .env
    environment:
      DB_NAME: skillsync_auth
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      JAVA_OPTS: "-Xms128m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      skillsync-net:
        aliases:
          - auth-service
          - skillsync-auth
    restart: unless-stopped

  user-service:
    image: ${DOCKERHUB_USERNAME}/skillsync:user
    container_name: skillsync-user
    deploy:
      resources:
        limits:
          memory: 640M
    env_file: .env
    environment:
      DB_NAME: skillsync_user
      JAVA_OPTS: "-Xms128m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      skillsync-net:
        aliases:
          - user-service
          - skillsync-user
    restart: unless-stopped

  skill-service:
    image: ${DOCKERHUB_USERNAME}/skillsync:skill
    container_name: skillsync-skill
    deploy:
      resources:
        limits:
          memory: 640M
    env_file: .env
    environment:
      DB_NAME: skillsync_skill
      JAVA_OPTS: "-Xms128m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      skillsync-net:
        aliases:
          - skill-service
          - skillsync-skill
    restart: unless-stopped

  session-service:
    image: ${DOCKERHUB_USERNAME}/skillsync:session
    container_name: skillsync-session
    deploy:
      resources:
        limits:
          memory: 640M
    env_file: .env
    environment:
      DB_NAME: skillsync_session
      JAVA_OPTS: "-Xms128m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      skillsync-net:
        aliases:
          - session-service
          - skillsync-session
    restart: unless-stopped

  # group-service: MERGED into user-service
  # mentor-service: MERGED into user-service

  # review-service: MERGED into session-service

  notification-service:
    image: ${DOCKERHUB_USERNAME}/skillsync:notification
    container_name: skillsync-notification
    deploy:
      resources:
        limits:
          memory: 640M
    env_file: .env
    environment:
      DB_NAME: skillsync_notification
      JAVA_OPTS: "-Xms128m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8088/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      skillsync-net:
        aliases:
          - notification-service
          - skillsync-notification
    restart: unless-stopped

  payment-service:
    image: ${DOCKERHUB_USERNAME}/skillsync:payment
    container_name: skillsync-payment
    deploy:
      resources:
        limits:
          memory: 640M
    env_file: .env
    environment:
      DB_NAME: skillsync_payment
      JAVA_OPTS: "-Xms128m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8086/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      skillsync-net:
        aliases:
          - payment-service
          - skillsync-payment
    restart: unless-stopped

# ======================== VOLUMES & NETWORKS ==================

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  skillsync-net:
    driver: bridge
