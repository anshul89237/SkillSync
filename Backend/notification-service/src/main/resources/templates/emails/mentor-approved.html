<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mentor Approved</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f7f9; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 28px; font-weight: bold; color: #10b981; letter-spacing: -1px; }
        .content { margin-bottom: 30px; }
        .footer { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 40px; }
        .btn { display: inline-block; background-color: #10b981; color: #ffffff !important; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: 600; }
        .highlight { color: #10b981; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">SkillSync</div>
        </div>
        <div class="content">
            <h2 th:text="'Congratulations, ' + ${recipientName} + '!'">Hello Mentor!</h2>
            <p>Your mentor application has been <span class="highlight">APPROVED</span>!</p>
            <p>You can now start creating sessions and mentoring learners in the community.</p>
            <div style="text-align: center; margin-top: 30px;">
                <a th:href="${actionUrl}" class="btn">Go to Dashboard</a>
            </div>
        </div>
        <div class="footer">
            &copy; 2026 SkillSync. All rights reserved.
        </div>
    </div>
</body>
</html>
