<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Session Request - SkillSync</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #222;">
    <p>Hello <span th:text="${mentorName}">Mentor</span>,</p>

    <p>You have received a new session request.</p>

    <p>
        Learner: <span th:text="${learnerEmail}">learner@example.com</span><br/>
        Date: <span th:text="${date}">2026-04-10</span><br/>
        Time: <span th:text="${time}">07:30 PM</span>
    </p>

    <p>Please login to approve or reject this session.</p>

    <p>SkillSync Team</p>
</body>
</html>
