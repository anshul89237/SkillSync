<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <title th:text="${title}">SkillSync Notification</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:Segoe UI,Arial,sans-serif;color:#0f172a;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9;padding:24px 12px;">
    <tr>
        <td align="center">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:620px;background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;">
                <tr>
                    <td style="padding:22px 24px;background:linear-gradient(135deg,#4f46e5,#7c3aed);text-align:center;">
                        <div style="font-size:24px;font-weight:800;color:#ffffff;letter-spacing:0.02em;">SkillSync</div>
                        <p style="margin:8px 0 0 0;font-size:13px;color:#e0e7ff;" th:if="${preheader}" th:text="${preheader}">SkillSync update</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:24px 24px 14px 24px;">
                        <p style="margin:0 0 8px 0;font-size:14px;color:#475569;">Hi <span th:text="${recipientName}">there</span>,</p>
                        <h1 style="margin:0 0 12px 0;font-size:28px;line-height:1.25;color:#0f172a;" th:text="${title}">Notification</h1>
                        <p style="margin:0;font-size:15px;line-height:1.7;color:#334155;" th:text="${primaryMessage}">Primary message</p>
                    </td>
                </tr>
                <tr th:if="${detailsHtml}">
                    <td style="padding:0 24px;">
                        <div style="border:1px solid #cbd5e1;border-radius:12px;background:#f8fafc;padding:14px 16px;">
                            <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#475569;margin-bottom:8px;" th:text="${detailsTitle}">Important details</div>
                            <div style="font-size:14px;line-height:1.7;color:#334155;" th:utext="${detailsHtml}">Details</div>
                        </div>
                    </td>
                </tr>
                <tr th:if="${actionUrl}">
                    <td style="padding:20px 24px 8px 24px;text-align:center;">
                        <a th:href="${actionUrl}" style="display:inline-block;background:#4f46e5;color:#ffffff;text-decoration:none;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:700;" th:text="${actionText}">Open SkillSync</a>
                    </td>
                </tr>
                <tr>
                    <td style="padding:14px 24px;">
                        <hr style="border:none;border-top:1px solid #e2e8f0;margin:0;">
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 24px 24px 24px;">
                        <p style="margin:0 0 8px 0;font-size:13px;line-height:1.6;color:#64748b;" th:text="${footerNote}">Need help? Contact support.</p>
                        <p style="margin:0;font-size:12px;color:#94a3b8;">SkillSync Support • support@skillsync.mraks.dev</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
