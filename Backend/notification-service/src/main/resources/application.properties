spring.application.name=notification-service
server.port=${SERVER_PORT:8088}

# ============================================================
# Config Server (Spring Boot 3 modern approach - replaces bootstrap.properties)
# ============================================================
spring.config.import=configserver:http://${CONFIG_SERVER_HOST:skillsync-config}:8888
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-interval=6000
spring.cloud.config.retry.multiplier=1.5

# ============================================================
# Database
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skillsync_notification}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.properties.hibernate.default_schema=notifications
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# Connection pool resilience
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.initialization-fail-timeout=-1

# ============================================================
# RabbitMQ
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ============================================================
# Eureka Client
# ============================================================
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:skillsync-eureka}:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.registry-fetch-interval-seconds=5

# ============================================================
# CORS / WebSocket - Allowed Origins (configurable via env variable)
# ============================================================
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# ============================================================
# App Base URL (used in email action links)
# ============================================================
app.base-url=${APP_BASE_URL:https://skillsync.mraks.dev}

# ============================================================
# Actuator & Observability
# ============================================================
logging.file.name=logs/notification-service.log
management.endpoints.web.exposure.include=health,info,metrics,caches,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=notification-service
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# Structured logging with traceId/spanId
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]

# ============================================================
# Swagger / OpenAPI (springdoc)
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
springdoc.show-actuator=false

# ============================================================
# Redis Cache
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=1000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=2000ms

# Cache TTL (seconds)
cache.ttl.notification=120
cache.ttl.default=120

# ============================================================
# Email (GMAIL SMTP - configured via .env)
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Thymeleaf for Email Templates
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true
