spring.application.name=payment-service
server.port=${SERVER_PORT:8086}

# ============================================================
# Config Server (Spring Boot 3 modern approach)
# ============================================================
spring.config.import=configserver:http://${CONFIG_SERVER_HOST:skillsync-config}:8888
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-interval=6000
spring.cloud.config.retry.multiplier=1.5

# ============================================================
# Database
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skillsync_payment}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.properties.hibernate.default_schema=payments
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Connection pool resilience
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.initialization-fail-timeout=-1

# ============================================================
# RabbitMQ
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Publisher confirms: wait for broker ACK before marking SENT
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true

# ============================================================
# Eureka Client
# ============================================================
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:skillsync-eureka}:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.registry-fetch-interval-seconds=5

# ============================================================
# Actuator & Observability
# ============================================================
logging.file.name=logs/payment-service.log
management.endpoints.web.exposure.include=health,info,metrics,caches,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=payment-service
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# Structured logging with traceId/spanId
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]

# ============================================================
# Swagger / OpenAPI (springdoc)
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
springdoc.show-actuator=false

# ============================================================
# Razorpay Payment Gateway
# ============================================================
razorpay.api.key=${RAZORPAY_API_KEY:rzp_test_SczzqTbsV9t2w3}
razorpay.api.secret=${RAZORPAY_API_SECRET:N0Knk4XfU0P99dN8p87EDTJw}

# ============================================================
# Redis Cache
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=1000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# Cache TTL (seconds)
cache.ttl.payment=600
cache.ttl.default=300

# ============================================================
# RabbitMQ Retry (exponential backoff → DLQ on exhaustion)
# ============================================================
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# ============================================================
# Resilience4j — Circuit Breaker (Razorpay calls)
# ============================================================
resilience4j.circuitbreaker.instances.razorpay.register-health-indicator=true
resilience4j.circuitbreaker.instances.razorpay.sliding-window-size=10
resilience4j.circuitbreaker.instances.razorpay.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.razorpay.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.razorpay.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.razorpay.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.razorpay.sliding-window-type=COUNT_BASED

# ============================================================
# Resilience4j — Timeout (Razorpay calls)
# ============================================================
resilience4j.timelimiter.instances.razorpay.timeout-duration=5s
resilience4j.timelimiter.instances.razorpay.cancel-running-future=true

# ============================================================
# Saga Recovery Scheduler
# ============================================================
saga.recovery.interval-ms=300000
saga.recovery.timeout-minutes=10
saga.recovery.max-retries=3

# ============================================================
# Outbox Publisher Confirms
# ============================================================
outbox.publisher.confirm-timeout-ms=5000
outbox.publisher.batch-size=50
outbox.publisher.max-retries=5

