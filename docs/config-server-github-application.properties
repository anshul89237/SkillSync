# ============================================================
#  SkillSync - Shared Configuration (Config Server - GitHub)
#  Repo: https://github.com/anshul89237/CloudConfig
#  File: application.properties
#
#  Applied to ALL microservices via Spring Cloud Config
#  All values use ${ENV_VAR:default} for dual-mode support
# ============================================================

# ======================== EUREKA ==============================
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true

# ======================== DATABASE ============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skillsync_default}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================== JPA / HIBERNATE =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ======================== CONFIG RETRY ========================
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=2000

# ======================== JWT =================================
jwt.secret=${JWT_SECRET}
jwt.access-expiration=86400000
jwt.refresh-expiration=604800000

# ======================== ACTUATOR ============================
management.endpoints.web.exposure.include=health,info

# ======================== LOGGING =============================
logging.level.com.skillsync=INFO
logging.file.name=logs/${spring.application.name}.log
